<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>if(localStorage.getItem('soxlab_dark')==='1')document.documentElement.classList.add('dark');</script>
  <title>Pedidos - SoxLab</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/custom.css" />
</head>
<body class="min-h-screen bg-gray-50">

  <!-- ── Navbar Admin ──────────────────────────────────────────────────────── -->
  <nav class="bg-white border-b border-gray-200 sticky top-0 z-40 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 h-14 flex items-center justify-between">
      <span class="text-lg font-bold text-indigo-600">🧦 SoxLab <span class="text-gray-400 font-normal text-sm">Admin</span></span>
      <div class="hidden md:flex items-center gap-4 text-sm">
        <a href="index.html"       class="text-gray-500 hover:text-indigo-600">Dashboard</a>
        <a href="productos.html"   class="text-gray-500 hover:text-indigo-600">Productos</a>
        <a href="pedidos.html"     class="font-semibold text-indigo-600">Pedidos</a>
        <a href="sucursales.html"  class="text-gray-500 hover:text-indigo-600">Sucursales</a>
        <a href="usuarios.html"    class="text-gray-500 hover:text-indigo-600">Usuarios</a>
        <a href="mapa.html"        class="text-gray-500 hover:text-indigo-600">Mapa</a>
        <a href="catalogo.html"    class="text-gray-500 hover:text-indigo-600">Tienda</a>
        <button class="btn-dark-toggle text-base text-gray-400 hover:text-indigo-600 transition-colors" title="Modo oscuro" aria-label="Modo oscuro">🌙</button>
        <button id="btn-logout"
                class="ml-2 text-xs border border-gray-200 rounded-lg px-3 py-1.5
                       text-gray-500 hover:bg-gray-50 hover:text-red-500 transition-colors">
          Salir
        </button>
      </div>
      <button id="btn-mobile-menu" aria-expanded="false" aria-controls="mobile-menu"
              class="md:hidden p-2 rounded-lg text-gray-500 hover:bg-gray-100 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2"
             viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round"
             d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
    </div>
    <div id="mobile-menu" class="hidden md:hidden border-t border-gray-100 bg-white">
      <div class="max-w-7xl mx-auto px-4 py-2 flex flex-col text-sm">
        <a href="index.html"      class="py-2 text-gray-600 hover:text-indigo-600">Dashboard</a>
        <a href="productos.html"  class="py-2 text-gray-600 hover:text-indigo-600">Productos</a>
        <a href="pedidos.html"    class="py-2 font-semibold text-indigo-600">Pedidos</a>
        <a href="sucursales.html" class="py-2 text-gray-600 hover:text-indigo-600">Sucursales</a>
        <a href="usuarios.html"   class="py-2 text-gray-600 hover:text-indigo-600">Usuarios</a>
        <a href="mapa.html"       class="py-2 text-gray-600 hover:text-indigo-600">Mapa</a>
        <a href="catalogo.html"   class="py-2 text-gray-600 hover:text-indigo-600">Tienda</a>
        <button class="btn-dark-toggle py-2 text-left text-gray-500 hover:text-indigo-600 transition-colors">🌙</button>
        <button id="btn-logout-mobile"
                class="my-2 text-left text-xs border border-gray-200 rounded-lg px-3 py-1.5 w-fit
                       text-gray-500 hover:text-red-500 transition-colors">Salir</button>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 py-8 flex flex-col gap-6">

    <!-- ── Encabezado ────────────────────────────────────────────────────── -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
      <div>
        <h1 class="text-2xl font-bold text-gray-800">Pedidos</h1>
        <p class="text-sm text-gray-400 mt-1">Gestión y seguimiento de pedidos</p>
      </div>
      <button id="btn-exportar-pedidos"
              class="inline-flex items-center gap-2 border border-gray-200 hover:bg-gray-50
                     text-gray-600 font-medium rounded-xl px-4 py-2 transition-colors text-sm">
        ↓ Exportar CSV
      </button>
    </div>

    <!-- ── Tabs de estado ────────────────────────────────────────────────── -->
    <div id="tabs-estado" class="flex flex-wrap gap-2">
      <button data-tab=""            class="px-3 py-1.5 rounded-lg text-sm font-medium bg-indigo-600 text-white">Todos</button>
      <button data-tab="pendiente"   class="px-3 py-1.5 rounded-lg text-sm font-medium text-gray-500 border border-gray-200 hover:bg-gray-50">Pendiente</button>
      <button data-tab="confirmado"  class="px-3 py-1.5 rounded-lg text-sm font-medium text-gray-500 border border-gray-200 hover:bg-gray-50">Confirmado</button>
      <button data-tab="en_proceso"  class="px-3 py-1.5 rounded-lg text-sm font-medium text-gray-500 border border-gray-200 hover:bg-gray-50">En proceso</button>
      <button data-tab="listo"       class="px-3 py-1.5 rounded-lg text-sm font-medium text-gray-500 border border-gray-200 hover:bg-gray-50">Listo</button>
      <button data-tab="entregado"   class="px-3 py-1.5 rounded-lg text-sm font-medium text-gray-500 border border-gray-200 hover:bg-gray-50">Entregado</button>
      <button data-tab="cancelado"   class="px-3 py-1.5 rounded-lg text-sm font-medium text-gray-500 border border-gray-200 hover:bg-gray-50">Cancelado</button>
    </div>

    <!-- ── Búsqueda ──────────────────────────────────────────────────────── -->
    <div>
      <input id="search-pedidos" type="search"
             placeholder="Buscar por cliente o correo..."
             class="w-full max-w-sm rounded-lg border border-gray-300 px-3 py-1.5 text-sm
                    focus:outline-none focus:ring-2 focus:ring-indigo-400" />
    </div>

    <!-- ── Tabla ─────────────────────────────────────────────────────────── -->
    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-x-auto">
      <table class="w-full text-left">
        <thead class="bg-gray-50 border-b border-gray-100">
          <tr class="text-xs text-gray-400">
            <th class="py-3 px-3 font-medium">ID</th>
            <th class="py-3 px-3 font-medium">Cliente</th>
            <th class="py-3 px-3 font-medium">Correo</th>
            <th class="py-3 px-3 font-medium">Total</th>
            <th class="py-3 px-3 font-medium">Estado</th>
            <th class="py-3 px-3 font-medium">Fecha</th>
          </tr>
        </thead>
        <tbody id="tbody-pedidos">
          <tr class="animate-pulse border-b border-gray-100" aria-hidden="true">
            <td class="py-2 px-3"><div class="h-3 bg-gray-200 rounded w-14"></div></td>
            <td class="py-2 px-3"><div class="h-3 bg-gray-200 rounded w-28"></div></td>
            <td class="py-2 px-3"><div class="h-3 bg-gray-200 rounded w-36"></div></td>
            <td class="py-2 px-3"><div class="h-3 bg-gray-200 rounded w-16"></div></td>
            <td class="py-2 px-3"><div class="h-5 bg-gray-200 rounded-full w-20"></div></td>
            <td class="py-2 px-3"><div class="h-3 bg-gray-200 rounded w-24"></div></td>
          </tr>
          <tr class="animate-pulse border-b border-gray-100" aria-hidden="true">
            <td class="py-2 px-3"><div class="h-3 bg-gray-200 rounded w-14"></div></td>
            <td class="py-2 px-3"><div class="h-3 bg-gray-200 rounded w-32"></div></td>
            <td class="py-2 px-3"><div class="h-3 bg-gray-200 rounded w-40"></div></td>
            <td class="py-2 px-3"><div class="h-3 bg-gray-200 rounded w-16"></div></td>
            <td class="py-2 px-3"><div class="h-5 bg-gray-200 rounded-full w-20"></div></td>
            <td class="py-2 px-3"><div class="h-3 bg-gray-200 rounded w-24"></div></td>
          </tr>
          <tr class="animate-pulse border-b border-gray-100" aria-hidden="true">
            <td class="py-2 px-3"><div class="h-3 bg-gray-200 rounded w-14"></div></td>
            <td class="py-2 px-3"><div class="h-3 bg-gray-200 rounded w-24"></div></td>
            <td class="py-2 px-3"><div class="h-3 bg-gray-200 rounded w-36"></div></td>
            <td class="py-2 px-3"><div class="h-3 bg-gray-200 rounded w-16"></div></td>
            <td class="py-2 px-3"><div class="h-5 bg-gray-200 rounded-full w-20"></div></td>
            <td class="py-2 px-3"><div class="h-3 bg-gray-200 rounded w-24"></div></td>
          </tr>
          <tr class="animate-pulse border-b border-gray-100" aria-hidden="true">
            <td class="py-2 px-3"><div class="h-3 bg-gray-200 rounded w-14"></div></td>
            <td class="py-2 px-3"><div class="h-3 bg-gray-200 rounded w-28"></div></td>
            <td class="py-2 px-3"><div class="h-3 bg-gray-200 rounded w-32"></div></td>
            <td class="py-2 px-3"><div class="h-3 bg-gray-200 rounded w-16"></div></td>
            <td class="py-2 px-3"><div class="h-5 bg-gray-200 rounded-full w-20"></div></td>
            <td class="py-2 px-3"><div class="h-3 bg-gray-200 rounded w-24"></div></td>
          </tr>
          <tr class="animate-pulse border-b border-gray-100" aria-hidden="true">
            <td class="py-2 px-3"><div class="h-3 bg-gray-200 rounded w-14"></div></td>
            <td class="py-2 px-3"><div class="h-3 bg-gray-200 rounded w-36"></div></td>
            <td class="py-2 px-3"><div class="h-3 bg-gray-200 rounded w-40"></div></td>
            <td class="py-2 px-3"><div class="h-3 bg-gray-200 rounded w-16"></div></td>
            <td class="py-2 px-3"><div class="h-5 bg-gray-200 rounded-full w-20"></div></td>
            <td class="py-2 px-3"><div class="h-3 bg-gray-200 rounded w-24"></div></td>
          </tr>
          <tr class="animate-pulse" aria-hidden="true">
            <td class="py-2 px-3"><div class="h-3 bg-gray-200 rounded w-14"></div></td>
            <td class="py-2 px-3"><div class="h-3 bg-gray-200 rounded w-28"></div></td>
            <td class="py-2 px-3"><div class="h-3 bg-gray-200 rounded w-36"></div></td>
            <td class="py-2 px-3"><div class="h-3 bg-gray-200 rounded w-16"></div></td>
            <td class="py-2 px-3"><div class="h-5 bg-gray-200 rounded-full w-20"></div></td>
            <td class="py-2 px-3"><div class="h-3 bg-gray-200 rounded w-24"></div></td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <!-- ── Modal Detalle de Pedido ────────────────────────────────────────────── -->
  <div id="modal-pedido"
       class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg max-h-[90vh] overflow-y-auto p-6">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-base font-semibold text-gray-800">Detalle del pedido</h2>
        <button id="btn-modal-pedido-cerrar"
                class="text-gray-400 hover:text-gray-600 text-xl leading-none">×</button>
      </div>
      <div id="modal-pedido-body"></div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
  <script type="module">
    import auth        from './js/modules/auth.js';
    import uiPedidos   from './js/modules/uiPedidos.js';
    import { initAdminNav } from './js/modules/adminNav.js';
    import darkMode    from './js/modules/darkMode.js';
    initAdminNav();
    darkMode.init();
    const logout = () => { auth.logout(); window.location.replace('login.html'); };
    document.getElementById('btn-logout')?.addEventListener('click', logout);
    document.getElementById('btn-logout-mobile')?.addEventListener('click', logout);
    window.__soxlab_ready ? uiPedidos.initPedidos() : window.addEventListener('soxlab:ready', () => uiPedidos.initPedidos(), { once: true });
  </script>

</body>
</html>
