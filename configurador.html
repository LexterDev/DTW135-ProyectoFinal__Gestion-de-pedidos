<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurador de Calcetines - SoxLab</title>

    <!-- Tailwind css y custom -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="css/custom.css" rel="stylesheet">

    <!-- Verificacion de dark mode -->
    <script>
        if (localStorage.getItem('soxlab_dark') === '1') {
            document.documentElement.classList.add('dark');
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- Navegacion superior -->
    <header class="sticky top-0 z-40 bg-white border-b shadow-sm border-gray-200">
        <div class="flex justify-between items-center px-4 mx-auto max-w-6xl h-14">
            
            <div class="flex gap-3 items-center">
                <a href="catalogo.html" class="text-sm text-gray-500 hover:text-indigo-600">← Catálogo</a>
                <span class="text-gray-300">|</span>
                <span class="text-lg font-bold text-indigo-600">🧦 SoxLab</span>
                <span class="text-sm font-medium text-gray-500">Configurador</span>
            </div>
            
            <div class="flex gap-3 items-center text-sm">
                <a href="mis-disenos.html" class="text-gray-500 hover:text-indigo-600">Mis diseños</a>
                <a href="checkout.html" class="text-gray-500 hover:text-indigo-600">🛒 Carrito</a>
                <button class="transition-colors text-base text-gray-400 hover:text-indigo-600 btn-dark-toggle" aria-label="Modo oscuro" title="Modo oscuro">🌙</button>
            </div>

        </div>
    </header>

    <!-- Contenedor principal -->
    <main class="py-8 px-4 mx-auto max-w-6xl">
        
        <div class="mb-6">
            <h1 class="text-2xl font-bold text-gray-800">Configura tu calcetín</h1>
            <p class="mt-1 text-sm text-gray-400">Elige los colores de cada zona y añade un estampado único.</p>
        </div>

        <div class="grid items-start gap-8 grid-cols-1 lg:grid-cols-3">

            <!-- Panel de controles -->
            <div class="flex flex-col gap-6 lg:col-span-2">

                <!-- Colores -->
                <section class="p-6 bg-white border border-gray-100 shadow-sm rounded-2xl">
                    <h2 class="mb-4 text-sm font-semibold text-gray-700">Colores por zona</h2>
                    <div id="color-pickers" class="flex flex-col gap-3"></div>
                </section>

                <!-- Configuracion del estampado -->
                <section class="p-6 bg-white border border-gray-100 shadow-sm rounded-2xl">
                    <h2 class="mb-4 text-sm font-semibold text-gray-700">Estampado</h2>
                    <select id="select-estampado" class="px-3 py-2 w-full text-sm bg-white border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400"></select>

                    <div class="grid grid-cols-3 gap-3 mt-4">
                        <div class="flex flex-col gap-1">
                            <label class="text-xs text-gray-500">Posición X</label>
                            <input id="stamp-x" type="range" min="68" max="268" step="2" class="w-full accent-indigo-600">
                        </div>
                        <div class="flex flex-col gap-1">
                            <label class="text-xs text-gray-500">Posición Y</label>
                            <input id="stamp-y" type="range" min="56" max="260" step="2" class="w-full accent-indigo-600">
                        </div>
                        <div class="flex flex-col gap-1">
                            <label class="text-xs text-gray-500">Escala</label>
                            <input id="stamp-escala" type="range" min="0.5" max="3" step="0.1" class="w-full accent-indigo-600">
                        </div>
                    </div>
                </section>

                <!-- Opciones para guardar -->
                <section class="p-6 bg-white border border-gray-100 shadow-sm rounded-2xl">
                    <h2 class="mb-4 text-sm font-semibold text-gray-700">Guardar diseño</h2>
                    <div class="flex gap-3">
                        <input id="diseno-nombre" type="text" placeholder="Nombre de tu diseño…" class="flex-1 px-3 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400">
                        <button id="btn-guardar-diseno" class="px-5 py-2 text-sm font-semibold text-white whitespace-nowrap bg-indigo-600 rounded-lg transition-colors hover:bg-indigo-700">Guardar</button>
                    </div>
                    <p class="mt-2 text-xs text-gray-400">
                        Inicia sesión para que tus diseños se guarden permanentemente en
                        <a href="mis-disenos.html" class="text-indigo-500 hover:underline">Mis diseños</a>.
                    </p>
                </section>

            </div>

            <!-- Panel de vista previa del calcetin -->
            <aside class="flex sticky top-20 flex-col gap-4">
                <div class="flex flex-col gap-4 items-center p-6 bg-white border border-gray-100 shadow-sm rounded-2xl">
                    <h2 class="self-start text-sm font-semibold text-gray-700">Vista previa</h2>
                    <canvas id="sock-canvas" class="max-w-full border border-gray-100 rounded-xl" style="image-rendering:crisp-edges"></canvas>
                    <button id="btn-reset-diseno" class="text-xs text-gray-400 hover:text-gray-600 hover:underline">Restablecer colores</button>
                </div>
            </aside>

        </div>
    </main>

    <!-- Modulos JS -->
    <script type="module" src="js/app.js"></script>
    <script type="module">
        import uiConfigurador from './js/modules/uiConfigurador.js';
        import darkMode from './js/modules/darkMode.js';
        
        darkMode.init();
        
        if (window.__soxlab_ready) {
            uiConfigurador.initConfigurador();
        } else {
            window.addEventListener('soxlab:ready', () => {
                uiConfigurador.initConfigurador();
            }, { once: true });
        }
    </script>

</body>
</html>
