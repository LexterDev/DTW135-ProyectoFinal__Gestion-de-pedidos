<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>if(localStorage.getItem('soxlab_dark')==='1')document.documentElement.classList.add('dark');</script>
  <title>Mis Pedidos - SoxLab</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/custom.css" />
</head>
<body class="min-h-screen bg-gray-50">

  <!-- ── Navbar cliente ────────────────────────────────────────────────────── -->
  <nav class="bg-white border-b border-gray-200 sticky top-0 z-40 shadow-sm">
    <div class="max-w-3xl mx-auto px-4 h-14 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="catalogo.html" class="text-sm text-gray-500 hover:text-indigo-600 transition-colors">
          ← Catálogo
        </a>
        <span class="text-gray-300">|</span>
        <span class="text-lg font-bold text-indigo-600">🧦 SoxLab</span>
      </div>
      <button class="btn-dark-toggle text-base text-gray-400 hover:text-indigo-600 transition-colors" title="Modo oscuro" aria-label="Modo oscuro">🌙</button>
      <button id="btn-logout"
              class="text-xs border border-gray-200 rounded-lg px-3 py-1.5
                     text-gray-500 hover:bg-gray-50 hover:text-red-500 transition-colors">
        Salir
      </button>
    </div>
  </nav>

  <main class="max-w-3xl mx-auto px-4 py-8 flex flex-col gap-6">

    <!-- ── Encabezado ────────────────────────────────────────────────────── -->
    <div>
      <h1 class="text-2xl font-bold text-gray-800">Mis pedidos</h1>
      <p class="text-sm text-gray-400 mt-1">
        Hola, <span id="cliente-nombre" class="font-medium text-gray-600">–</span>
      </p>
    </div>

    <!-- ── Estado vacío ──────────────────────────────────────────────────── -->
    <div id="empty-state" class="hidden text-center py-20 px-4">
      <p class="text-5xl mb-4">📦</p>
      <h2 class="text-xl font-semibold text-gray-700">Sin pedidos aún</h2>
      <p class="text-gray-400 text-sm mt-2">Explora el catálogo y realiza tu primer pedido.</p>
      <a href="catalogo.html"
         class="inline-block mt-6 bg-indigo-600 hover:bg-indigo-700 text-white
                font-semibold rounded-lg px-6 py-2.5 transition-colors">
        Ir al catálogo
      </a>
    </div>

    <!-- ── Lista de pedidos ───────────────────────────────────────────────── -->
    <div id="pedidos-list" class="flex flex-col gap-4">
      <div class="animate-pulse bg-white rounded-2xl border border-gray-100 shadow-sm p-5 flex flex-col gap-4" aria-hidden="true">
        <div class="flex items-start justify-between">
          <div class="flex flex-col gap-1.5">
            <div class="h-3 bg-gray-200 rounded w-24"></div>
            <div class="h-3 bg-gray-200 rounded w-32"></div>
          </div>
          <div class="h-5 bg-gray-200 rounded-full w-20"></div>
        </div>
        <div class="flex flex-col gap-2">
          <div class="h-3 bg-gray-200 rounded w-full"></div>
          <div class="h-3 bg-gray-200 rounded w-4/5"></div>
        </div>
        <div class="flex items-end justify-between border-t border-gray-100 pt-3">
          <div class="flex flex-col gap-1.5">
            <div class="h-3 bg-gray-200 rounded w-20"></div>
            <div class="h-3 bg-gray-200 rounded w-40"></div>
          </div>
          <div class="h-6 bg-gray-200 rounded w-20"></div>
        </div>
      </div>
      <div class="animate-pulse bg-white rounded-2xl border border-gray-100 shadow-sm p-5 flex flex-col gap-4" aria-hidden="true">
        <div class="flex items-start justify-between">
          <div class="flex flex-col gap-1.5">
            <div class="h-3 bg-gray-200 rounded w-24"></div>
            <div class="h-3 bg-gray-200 rounded w-32"></div>
          </div>
          <div class="h-5 bg-gray-200 rounded-full w-20"></div>
        </div>
        <div class="flex flex-col gap-2">
          <div class="h-3 bg-gray-200 rounded w-full"></div>
          <div class="h-3 bg-gray-200 rounded w-3/4"></div>
        </div>
        <div class="flex items-end justify-between border-t border-gray-100 pt-3">
          <div class="flex flex-col gap-1.5">
            <div class="h-3 bg-gray-200 rounded w-20"></div>
            <div class="h-3 bg-gray-200 rounded w-36"></div>
          </div>
          <div class="h-6 bg-gray-200 rounded w-20"></div>
        </div>
      </div>
      <div class="animate-pulse bg-white rounded-2xl border border-gray-100 shadow-sm p-5 flex flex-col gap-4" aria-hidden="true">
        <div class="flex items-start justify-between">
          <div class="flex flex-col gap-1.5">
            <div class="h-3 bg-gray-200 rounded w-24"></div>
            <div class="h-3 bg-gray-200 rounded w-32"></div>
          </div>
          <div class="h-5 bg-gray-200 rounded-full w-20"></div>
        </div>
        <div class="flex flex-col gap-2">
          <div class="h-3 bg-gray-200 rounded w-full"></div>
          <div class="h-3 bg-gray-200 rounded w-4/5"></div>
        </div>
        <div class="flex items-end justify-between border-t border-gray-100 pt-3">
          <div class="flex flex-col gap-1.5">
            <div class="h-3 bg-gray-200 rounded w-20"></div>
            <div class="h-3 bg-gray-200 rounded w-44"></div>
          </div>
          <div class="h-6 bg-gray-200 rounded w-20"></div>
        </div>
      </div>
    </div>

  </main>

  <script type="module" src="js/app.js"></script>
  <script type="module">
    import auth         from './js/modules/auth.js';
    import uiMisPedidos from './js/modules/uiMisPedidos.js';
    import darkMode     from './js/modules/darkMode.js';
    darkMode.init();
    document.getElementById('btn-logout')?.addEventListener('click', () => {
      auth.logout();
      window.location.replace('login.html');
    });
    window.__soxlab_ready ? uiMisPedidos.initMisPedidos() : window.addEventListener('soxlab:ready', () => uiMisPedidos.initMisPedidos(), { once: true });
  </script>

</body>
</html>
