<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>if(localStorage.getItem('soxlab_dark')==='1')document.documentElement.classList.add('dark');</script>
  <title>Mis Diseños - SoxLab</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/custom.css" />
  <link rel="icon" href="assets/favicon.ico" sizes="any">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
</head>
<body class="min-h-screen bg-gray-50">

  <!-- ── Navbar ────────────────────────────────────────────────────────────── -->
  <nav class="bg-white border-b border-gray-200 sticky top-0 z-40 shadow-sm">
    <div class="max-w-3xl mx-auto px-4 h-14 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="catalogo.html" class="text-sm text-gray-500 hover:text-indigo-600">← Catálogo</a>
        <span class="text-gray-300">|</span>
        <span class="text-lg font-bold"><span class="text-gray-900">🧦 Sox</span><span class="text-indigo-600">Lab</span></span>
      </div>
      <div class="flex items-center gap-3 text-sm">
        <a href="configurador.html" class="text-indigo-600 font-medium hover:underline">+ Nuevo diseño</a>
        <button class="btn-dark-toggle text-base text-gray-400 hover:text-indigo-600 transition-colors" title="Modo oscuro" aria-label="Modo oscuro"><i class="fa-regular fa-moon"></i></button>
        <button id="btn-logout"
                class="text-xs border border-gray-200 rounded-lg px-3 py-1.5
                       text-gray-500 hover:bg-gray-50 hover:text-red-500 transition-colors">
          Salir
        </button>
      </div>
    </div>
  </nav>

  <main class="max-w-3xl mx-auto px-4 py-8 flex flex-col gap-6">

    <div>
      <h1 class="text-2xl font-bold text-gray-800">Mis diseños</h1>
      <p class="text-sm text-gray-400 mt-1">Tus calcetines personalizados guardados</p>
    </div>

    <!-- Estado vacío -->
    <div id="empty-disenos" class="hidden text-center py-20">
      <p class="text-5xl mb-4">🎨</p>
      <h2 class="text-xl font-semibold text-gray-700">Aún no tienes diseños</h2>
      <p class="text-gray-400 text-sm mt-2">
        Crea tu primer diseño personalizado en el configurador.
      </p>
      <a href="configurador.html"
         class="inline-block mt-6 bg-indigo-600 hover:bg-indigo-700 text-white
                font-semibold rounded-lg px-6 py-2.5 transition-colors">
        Ir al configurador
      </a>
    </div>

    <!-- Lista de diseños -->
    <div id="disenos-list" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>

  </main>

  <script type="module" src="js/app.js"></script>
  <script type="module">
    import auth           from './js/modules/auth.js';
    import authGuard      from './js/modules/authGuard.js';
    import uiConfigurador from './js/modules/uiConfigurador.js';
    import darkMode       from './js/modules/darkMode.js';
    darkMode.init();

    document.getElementById('btn-logout')?.addEventListener('click', () => {
      auth.logout();
      window.location.replace('login.html');
    });

    function _initMisDisenos() {
      if (!authGuard.guard(['cliente', 'admin'])) return;
      uiConfigurador.initMisDisenos();
    }
    window.__soxlab_ready ? _initMisDisenos() : window.addEventListener('soxlab:ready', _initMisDisenos, { once: true });
  </script>

</body>
</html>
